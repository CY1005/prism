services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: prism
      POSTGRES_PASSWORD: prism_dev_2026
      POSTGRES_DB: prism
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prism"]
      interval: 10s
      timeout: 5s
      retries: 5

  analyzer:
    build:
      context: ./api
      network: host
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8001"
    volumes:
      - ./api:/app/api
    environment:
      DATABASE_URL: postgresql://prism:prism_dev_2026@db:5432/prism
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
      AUTH_SECRET: ${AUTH_SECRET}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8001/health/\")'"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    build:
      context: ./web
      args:
        DATABASE_URL: postgresql://prism:prism_dev_2026@db:5432/prism
        AUTH_SECRET: ${AUTH_SECRET}
        NEXT_PUBLIC_ANALYZER_URL: https://api-prism.19911005.xyz
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      DATABASE_URL: postgresql://prism:prism_dev_2026@db:5432/prism
      AUTH_SECRET: ${AUTH_SECRET}
      AI_KEY_ENCRYPTION_SECRET: ${AI_KEY_ENCRYPTION_SECRET}
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
      API_URL: http://analyzer:8001
      NEXT_PUBLIC_ANALYZER_URL: https://api-prism.19911005.xyz
      AUTH_TRUST_HOST: "true"
      AUTH_URL: https://prism.19911005.xyz
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  pgdata:
